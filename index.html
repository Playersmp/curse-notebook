<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 1: The Forbidden Notebook | Horror Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0507, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Creepster', 'Monaco', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Main game container */
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            border: 1px solid #8b0000;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            padding: 20px;
            transition: all 0.2s;
        }

        /* Two columns: monster left + notebook right */
        .duel-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        /* LEFT SIDE: MONSTER DOMAIN */
        .monster-side {
            flex: 1.2;
            min-width: 240px;
            background: #110000aa;
            border-radius: 40px;
            padding: 20px 15px;
            text-align: center;
            border-right: 3px solid #a52a2a;
            box-shadow: 0 0 20px #ff000022;
            backdrop-filter: blur(4px);
        }

        .monster-title {
            font-size: 1.3rem;
            color: #ff5e5e;
            text-shadow: 0 0 5px red;
            letter-spacing: 4px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .monster-canvas-container {
            background: #1a0b0b;
            border-radius: 50%;
            padding: 12px;
            box-shadow: 0 0 25px #b30000;
            margin-bottom: 20px;
            display: inline-block;
        }

        canvas#monsterCanvas {
            width: 200px;
            height: 200px;
            display: block;
            border-radius: 50%;
            background: #2c1414;
            cursor: pointer;
            transition: transform 0.2s;
        }

        canvas#monsterCanvas:hover {
            transform: scale(1.02);
        }

        .monster-whisper {
            background: #2f0e0e;
            padding: 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #ffb7b7;
            font-style: italic;
            border-left: 5px solid red;
            margin-top: 10px;
            font-weight: bold;
        }

        /* RIGHT SIDE: NOTEBOOK */
        .notebook-side {
            flex: 2;
            min-width: 300px;
            background: #1f1a12e0;
            background-image: repeating-linear-gradient(45deg, #2c241a 0px, #2c241a 2px, #3d3122 2px, #3d3122 8px);
            border-radius: 28px;
            padding: 20px;
            border: 2px solid #ac8e68;
            box-shadow: 10px 10px 20px black;
        }

        .notebook-header {
            font-family: 'Creepster', cursive;
            font-size: 2rem;
            color: #e6cf8b;
            text-align: center;
            text-shadow: 3px 3px 0 #5a1e1e;
            border-bottom: 2px dashed #9e6b3e;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .victim-list {
            background: #0f0b07;
            padding: 12px;
            border-radius: 20px;
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: monospace;
            border: 1px solid #7a4c2c;
        }

        .victim-list h3 {
            margin: 0 0 8px 0;
            color: #dba959;
            font-size: 1.2rem;
            text-align: center;
        }

        #victimNames {
            list-style: none;
            padding-left: 12px;
            margin: 0;
            color: #ecb176;
            font-size: 1rem;
        }

        #victimNames li {
            padding: 5px;
            border-bottom: 1px solid #4e2a1a;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .write-area {
            background: #2a241a;
            padding: 15px;
            border-radius: 25px;
            margin-top: 15px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        #nameInput {
            flex: 3;
            background: #000000aa;
            border: 2px solid #b5651e;
            padding: 12px 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace;
            color: #f2c94c;
            border-radius: 60px;
            outline: none;
            font-weight: bold;
        }

        #writeBtn {
            flex: 1;
            background: #5e2a2a;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
            box-shadow: 0 4px 0 #2f0f0f;
        }

        #writeBtn:hover {
            background: #8b3c3c;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2f0f0f;
        }

        #writeBtn:active {
            transform: translateY(2px);
        }

        .kill-counter {
            text-align: center;
            font-size: 1rem;
            background: black;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            color: crimson;
            font-weight: bold;
        }

        .restart-btn {
            background: #2c1a1a;
            border: 1px solid #af4c4c;
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffaaaa;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-family: monospace;
            transition: 0.2s;
        }

        .restart-btn:hover {
            background: #571f1f;
            color: white;
        }

        /* CUTSCENE OVERLAY */
        .cutscene-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s linear;
            font-family: 'Courier New', monospace;
        }

        .cutscene-card {
            background: #0c0303;
            max-width: 550px;
            width: 80%;
            border: 3px solid #aa2e2e;
            border-radius: 48px;
            padding: 30px 20px;
            text-align: center;
            color: #ffc9c9;
            box-shadow: 0 0 70px red;
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .cutscene-card h2 {
            font-size: 2.2rem;
            margin-top: 0;
            color: #d64545;
            text-shadow: 0 0 5px black;
        }

        .cutscene-text {
            font-size: 1.3rem;
            line-height: 1.4;
            margin: 20px 0;
            font-weight: bold;
        }

        .cutscene-skip {
            background: #611c1c;
            border: none;
            padding: 8px 20px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
        }

        /* misc */
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .warning {
            font-size: 0.8rem;
            color: #b66f6f;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="duel-layout">
        <!-- LEFT: MONSTER ZONE -->
        <div class="monster-side">
            <div class="monster-title">☠ SHADOW STALKER ☠</div>
            <div class="monster-canvas-container">
                <canvas id="monsterCanvas" width="200" height="200"></canvas>
            </div>
            <div class="monster-whisper" id="monsterWhisper">
                "Write a name... feel the curse..."
            </div>
        </div>

        <!-- RIGHT: NOTEBOOK -->
        <div class="notebook-side">
            <div class="notebook-header">📓 THE BLOOD NOTEBOOK 📓</div>
            <div class="victim-list">
                <h3>✍️ NAMES CLAIMED ✍️</h3>
                <ul id="victimNames">
                    <li style="color:#755a3a;">— none yet —</li>
                </ul>
            </div>
            <div class="write-area">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="Type a person's name..." autocomplete="off">
                    <button id="writeBtn">✍️ WRITE NAME</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="kill-counter">💀 SOULS TAKEN: <span id="killCountDisplay">0</span> / 3 💀</span>
                    <span class="warning">⚠️ each name = death ⚠️</span>
                </div>
            </div>
            <div class="footer">
                <button id="restartChapterBtn" class="restart-btn">⟳ RESTART CHAPTER</button>
                <span style="font-size:12px;">Chapter I — The Whispering Pages</span>
            </div>
        </div>
    </div>
</div>

<!-- CUTSCENE MODAL OVERLAY -->
<div id="cutsceneOverlay" class="cutscene-overlay">
    <div class="cutscene-card">
        <h2>⚰️ GRIM CUTSCENE ⚰️</h2>
        <div id="cutsceneMessage" class="cutscene-text">...</div>
        <button id="closeCutsceneBtn" class="cutscene-skip">▶ CONTINUE</button>
    </div>
</div>

<script>
    // ---------- GAME STATE ----------
    let killCount = 0;
    const MAX_KILLS = 3;          // Chapter 1 ends after 3 deaths
    let victims = [];              // store names killed
    let gameActive = false;        // becomes true after intro cutscene
    let processingAction = false;  // lock while cutscene/voice active
    let currentUtterance = null;   // for speech cancellation

    // DOM elements
    const victimListEl = document.getElementById('victimNames');
    const killCountSpan = document.getElementById('killCountDisplay');
    const nameInput = document.getElementById('nameInput');
    const writeBtn = document.getElementById('writeBtn');
    const restartBtn = document.getElementById('restartChapterBtn');
    const monsterWhisper = document.getElementById('monsterWhisper');
    const cutsceneOverlay = document.getElementById('cutsceneOverlay');
    const cutsceneMessageDiv = document.getElementById('cutsceneMessage');
    const closeCutsceneBtn = document.getElementById('closeCutsceneBtn');

    // Monster canvas context
    const canvas = document.getElementById('monsterCanvas');
    const ctx = canvas.getContext('2d');

    // ----- Scary Voice Helper -----
    function speakScary(text, onEnd = null) {
        if (!window.speechSynthesis) {
            console.warn("Speech not supported");
            if (onEnd) onEnd();
            return;
        }
        // cancel any ongoing scary voice to avoid overlap
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.75;      // slow, ominous
        utterance.pitch = 0.45;     // deep, demonic
        utterance.volume = 0.9;
        // optional: try to pick deep voice if available
        if (window.speechSynthesis.getVoices) {
            const voices = window.speechSynthesis.getVoices();
            const deepVoice = voices.find(v => v.name.toLowerCase().includes('deep') || v.name.toLowerCase().includes('male') && v.lang === 'en-US');
            if (deepVoice) utterance.voice = deepVoice;
        }
        utterance.onend = () => {
            currentUtterance = null;
            if (onEnd) onEnd();
        };
        utterance.onerror = () => {
            currentUtterance = null;
            if (onEnd) onEnd();
        };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // show cutscene modal with scary voice
    function showCutscene(title, message, scaryVoiceText, callbackAfterClose) {
        if (processingAction) return;
        processingAction = true;
        // update modal content
        cutsceneMessageDiv.innerHTML = `<span style="color:#ff8a8a;">✝️ ${message} ✝️</span>`;
        cutsceneOverlay.style.visibility = "visible";
        cutsceneOverlay.style.opacity = "1";
        
        // play scary voice
        speakScary(scaryVoiceText || message, () => {
            // voice finished, but we still keep overlay until user clicks Continue
        });
        
        // one-time click handler for continue
        const continueHandler = () => {
            cutsceneOverlay.style.visibility = "hidden";
            cutsceneOverlay.style.opacity = "0";
            closeCutsceneBtn.removeEventListener('click', continueHandler);
            if (callbackAfterClose) callbackAfterClose();
            processingAction = false;
        };
        closeCutsceneBtn.addEventListener('click', continueHandler, { once: true });
    }

    // hide cutscene manually if needed (safeguard)
    function forceHideCutscene() {
        cutsceneOverlay.style.visibility = "hidden";
        cutsceneOverlay.style.opacity = "0";
        processingAction = false;
    }

    // update notebook victim list UI
    function updateVictimList() {
        victimListEl.innerHTML = '';
        if (victims.length === 0) {
            victimListEl.innerHTML = '<li style="color:#755a3a;">— none yet —</li>';
            return;
        }
        victims.forEach(name => {
            const li = document.createElement('li');
            li.textContent = `🕯️ ${name} (perished)`;
            victimListEl.appendChild(li);
        });
    }

    // update kill counter UI
    function updateKillCounter() {
        killCountSpan.textContent = `${killCount} / ${MAX_KILLS}`;
        if (killCount >= MAX_KILLS) {
            killCountSpan.style.color = "#ff5555";
            killCountSpan.style.textShadow = "0 0 4px red";
        } else {
            killCountSpan.style.color = "crimson";
        }
    }

    // monster reaction & redraw (glow effect on kill)
    let monsterGlow = 0;
    function animateMonster(glowIntensity = 0) {
        // draw scary creature - always present on left side
        ctx.clearRect(0, 0, 200, 200);
        // background abyss
        ctx.fillStyle = "#1a0505";
        ctx.fillRect(0, 0, 200, 200);
        // horns
        ctx.fillStyle = "#3a1a1a";
        ctx.beginPath();
        ctx.moveTo(60, 45);
        ctx.lineTo(85, 15);
        ctx.lineTo(100, 40);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(140, 45);
        ctx.lineTo(115, 15);
        ctx.lineTo(100, 40);
        ctx.fill();
        // main head
        ctx.fillStyle = "#2c0f0f";
        ctx.beginPath();
        ctx.ellipse(100, 95, 55, 65, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#3d1a1a";
        ctx.beginPath();
        ctx.ellipse(100, 105, 45, 50, 0, 0, Math.PI * 2);
        ctx.fill();
        // eyes (glowing)
        if (glowIntensity > 0) {
            ctx.fillStyle = `rgba(255, 50, 50, ${Math.min(1, glowIntensity)})`;
        } else {
            ctx.fillStyle = "#ff3a3a";
        }
        ctx.beginPath();
        ctx.arc(75, 85, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(125, 85, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        ctx.arc(72, 82, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(122, 82, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(69, 78, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(119, 78, 2, 0, Math.PI * 2);
        ctx.fill();
        // mouth sharp teeth
        ctx.fillStyle = "#4e1010";
        ctx.beginPath();
        ctx.ellipse(100, 125, 28, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f0dbb2";
        for (let i = 0; i < 6; i++) {
            ctx.fillRect(80 + i * 8, 118, 4, 12);
        }
        // additional claw marks
        ctx.strokeStyle = "#8b3a3a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(45, 140);
        ctx.lineTo(30, 160);
        ctx.moveTo(155, 140);
        ctx.lineTo(170, 160);
        ctx.stroke();
    }

    function triggerMonsterReaction() {
        monsterWhisper.innerHTML = "👁️ \"Death feeds me... Write another...\" 👁️";
        let intensity = 1;
        const interval = setInterval(() => {
            animateMonster(intensity);
            intensity -= 0.2;
            if (intensity <= 0) {
                clearInterval(interval);
                animateMonster(0);
                setTimeout(() => {
                    monsterWhisper.innerHTML = "✍️ The notebook hungers... write a name... ✍️";
                }, 800);
            }
        }, 80);
    }

    // DEATH CUTSCENE: when name is written
    function killPersonByName(personName) {
        if (!gameActive) {
            showCutscene("LOCKED", "The notebook hasn't awakened yet... Start the chapter first.", "The ritual hasn't begun...", () => {});
            return false;
        }
        if (killCount >= MAX_KILLS) {
            showCutscene("CHAPTER END", "The chapter is sealed. Three souls already claimed. Restart to continue.", "No more pages... The darkness rests...", () => {});
            return false;
        }
        if (processingAction) {
            monsterWhisper.innerHTML = "⏳ Wait... the curse is still speaking...";
            return false;
        }
        if (!personName || personName.trim() === "") {
            monsterWhisper.innerHTML = "❓ The monster growls: 'You must write a name!'";
            return false;
        }
        const cleanName = personName.trim().substring(0, 20);
        if (victims.includes(cleanName)) {
            showCutscene("SAME SOUL", `"${cleanName}" already died... Their ghost lingers.`, `That name already perishes in agony...`, () => {});
            return false;
        }

        // DEATH SCENARIO DESCRIPTIONS (random scary)
        const deathScenes = [
            `${cleanName} screams as shadows tear them apart. Heart stops.`,
            `${cleanName} vanishes into a dark vortex, bones crack.`,
            `A ghastly hand drags ${cleanName} beneath the floor. Bloodcurdling cry.`,
            `${cleanName} feels the curse and collapses, eyes hollow.`,
            `The monster grins. ${cleanName} is erased from existence, flesh to dust.`
        ];
        const randomDeath = deathScenes[Math.floor(Math.random() * deathScenes.length)];
        const deathText = `✞ ${cleanName} ✞ | ${randomDeath}`;
        const voiceLine = `${cleanName}... dead. ${randomDeath.replace(cleanName, "this victim")}`;
        
        // add victim
        victims.push(cleanName);
        killCount++;
        updateVictimList();
        updateKillCounter();
        
        // Monster reaction + visual
        triggerMonsterReaction();
        
        // Show death cutscene with scary voice
        showCutscene("⚰️ DEATH NOTE ⚰️", deathText, voiceLine, () => {
            // after cutscene close, check if chapter end
            if (killCount >= MAX_KILLS) {
                endChapterOne();
            } else {
                // enable game again, no extra lock
                processingAction = false; // reset flag since showCutscene callback already sets processingAction false (inside after close)
                // but after cutscene ends, processingAction is set false. ready for next.
                nameInput.value = "";
                nameInput.focus();
            }
        });
        
        // Update monster whisper additionally after cutscene
        setTimeout(() => {
            if (killCount < MAX_KILLS) {
                monsterWhisper.innerHTML = `💀 "${cleanName} is no more... keep writing..." 💀`;
            }
        }, 400);
        
        return true;
    }

    // CHAPTER 1 FINALE
    function endChapterOne() {
        gameActive = false;   // disable writing
        writeBtn.disabled = true;
        nameInput.disabled = true;
        const finalMessage = "The monster rises from the left, laughing. 'Three names. Three deaths. Chapter One closes... but your soul is now bound to the notebook.' A cold wind extinguishes the lights... TO BE CONTINUED.";
        showCutscene("📖 CHAPTER I ENDING 📖", finalMessage, "Three souls... the pact is sealed. Chapter one ends... your nightmare begins.", () => {
            monsterWhisper.innerHTML = "🌀 CHAPTER I FINISHED. RESTART TO RELIVE THE HORROR 🌀";
            writeBtn.disabled = true;
            nameInput.disabled = true;
            processingAction = false;
        });
    }

    // INITIAL CUTSCENE: Boy finds notebook + monster appears on left
    function startInitialCutscene() {
        if (processingAction) return;
        gameActive = false;
        writeBtn.disabled = true;
        nameInput.disabled = true;
        
        const introText = "You, a curious boy, find a black notebook under a dead tree. As you open it, a terrifying monster materializes on your LEFT side, whispering ancient curses. 'Write a name... and that person will die.' Your hands tremble... The notebook accepts blood offerings.";
        showCutscene("📓 THE DISCOVERY 📓", introText, "I am the keeper... write a name... feed the pages...", () => {
            // Monster appears on left - already drawn on canvas, but now emphasize
            animateMonster(0.6);
            setTimeout(() => animateMonster(0), 500);
            monsterWhisper.innerHTML = "👹 'I am always at your left shoulder... Write a name... and witness death.' 👹";
            gameActive = true;
            writeBtn.disabled = false;
            nameInput.disabled = false;
            nameInput.value = "";
            nameInput.focus();
            processingAction = false;
        });
    }

    // FULL RESET CHAPTER
    function resetChapter() {
        if (processingAction) {
            if (currentUtterance) window.speechSynthesis.cancel();
            forceHideCutscene();
            processingAction = false;
        }
        // reset game vars
        killCount = 0;
        victims = [];
        gameActive = false;
        updateVictimList();
        updateKillCounter();
        nameInput.value = "";
        nameInput.disabled = true;
        writeBtn.disabled = true;
        // reset monster whisper
        monsterWhisper.innerHTML = "⬛ The shadow waits... restarting nightmare... ⬛";
        // redraw monster normal
        animateMonster(0);
        // start intro fresh
        startInitialCutscene();
    }

    // Event Listeners
    writeBtn.addEventListener('click', () => {
        if (!gameActive) {
            monsterWhisper.innerHTML = "❌ The notebook is silent. Restart or begin chapter?";
            return;
        }
        if (killCount >= MAX_KILLS) {
            showCutscene("END OF CHAPTER", "Chapter 1 is over. Press restart to experience the curse again.", "No more blood for this chapter...", () => {});
            return;
        }
        const rawName = nameInput.value.trim();
        if (rawName === "") {
            monsterWhisper.innerHTML = "⚠️ The monster hisses: 'WRITE A NAME!' ⚠️";
            return;
        }
        killPersonByName(rawName);
        // clear input field after attempt, but if cutscene is triggered we clear in callback?
        if (!processingAction) {
            nameInput.value = "";
        } else {
            // will clear after cutscene? we do it inside cutscene callback? but handled already? additional clear for safety
            setTimeout(() => {
                if (!processingAction) nameInput.value = "";
            }, 100);
        }
    });

    restartBtn.addEventListener('click', () => {
        if (processingAction) {
            if (currentUtterance) window.speechSynthesis.cancel();
            forceHideCutscene();
            processingAction = false;
        }
        resetChapter();
    });

    // allow Enter key in input
    nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && gameActive && !processingAction && killCount < MAX_KILLS) {
            e.preventDefault();
            writeBtn.click();
        }
    });

    // Draw monster initially and set up
    animateMonster(0);
    // start game with intro cutscene (auto trigger on page load, but due to user gesture required for voice, the start is triggered by restart? Actually best to show start message and require click? but we call resetChapter on load which calls startInitialCutscene which has user-interaction via cutscene overlay 'Continue' button - but the initial voice requires user interaction? SpeechSynthesis generally needs user gesture on some browsers, but the "Continue" button inside cutscene is a user gesture, and the speech will be triggered inside showCutscene when it speaks. However initial cutscene appears on load, and user must click "CONTINUE" which is a valid gesture. That's fine.
    window.addEventListener('load', () => {
        // initial reset + cutscene. show intro message with voice. The click on Continue button invokes speech too.
        resetChapter(); 
    });

    // additional cleanup if needed
    window.addEventListener('beforeunload', () => {
        if (currentUtterance) window.speechSynthesis.cancel();
    });
</script>
