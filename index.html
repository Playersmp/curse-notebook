<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 1: The Death Notebook - 3D Horror Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Creepster', monospace;
            color: #eedd99;
        }
        /* Game UI overlay */
        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border-left: 4px solid #aa2e2e;
            padding: 12px 16px;
            z-index: 10;
            pointer-events: auto;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        #victim-list {
            max-height: 150px;
            overflow-y: auto;
            margin: 10px 0;
            font-size: 14px;
            list-style: none;
            padding-left: 0;
        }
        #victim-list li {
            border-bottom: 1px solid #5a2e2e;
            padding: 4px;
            color: #ffb7b7;
        }
        .input-area {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        #nameInput {
            flex: 1;
            background: #1e1a14;
            border: 1px solid #b5651e;
            padding: 8px;
            color: #f2c94c;
            font-family: monospace;
            border-radius: 20px;
            outline: none;
        }
        button {
            background: #5e2a2a;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        button:hover {
            background: #8b3c3c;
            transform: scale(1.02);
        }
        .counter {
            font-size: 18px;
            text-align: center;
            margin: 8px 0;
            color: #ff5e5e;
            text-shadow: 0 0 4px darkred;
        }
        .restart {
            width: 100%;
            background: #2c1a1a;
            margin-top: 8px;
        }
        /* Cutscene Overlay */
        .cutscene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s;
            pointer-events: auto;
        }
        .cutscene-card {
            background: #0a0202;
            border: 3px solid #a12222;
            border-radius: 40px;
            max-width: 550px;
            width: 80%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,0,0,0.3);
            animation: flicker 2s infinite;
        }
        .cutscene-card h2 {
            font-size: 2.5rem;
            margin-top: 0;
            color: #d64545;
        }
        .cutscene-text {
            font-size: 1.3rem;
            margin: 20px 0;
            line-height: 1.4;
        }
        @keyframes flicker {
            0% { border-color: #a12222; box-shadow: 0 0 20px red; }
            50% { border-color: #ff4d4d; box-shadow: 0 0 40px #ff0000; }
            100% { border-color: #a12222; box-shadow: 0 0 20px red; }
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 0 red; }
            100% { text-shadow: 0 0 8px red; }
        }
        .monster-warning {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: #2a0a0a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border-left: 3px solid red;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="text-align:center; font-size:1.2rem;">📓 BLOOD NOTEBOOK 📓</div>
        <ul id="victim-list"><li>— no names yet —</li></ul>
        <div class="input-area">
            <input type="text" id="nameInput" placeholder="Write a name...">
            <button id="writeBtn">✍️ KILL</button>
        </div>
        <div class="counter">💀 SOULS TAKEN: <span id="killCount">0</span> / 3 💀</div>
        <button id="restartBtn" class="restart">⟳ RESTART CHAPTER</button>
    </div>
    <div class="instruction">🔮 The monster stands on your LEFT. Write names to feed the curse.</div>
    <div class="monster-warning" id="monsterWhisper">👁️ "Write a name..." 👁️</div>

    <!-- Cutscene overlay -->
    <div id="cutsceneOverlay" class="cutscene">
        <div class="cutscene-card">
            <h2>⚰️ GRIM OMEN ⚰️</h2>
            <div id="cutsceneMsg" class="cutscene-text">...</div>
            <button id="closeCutscene">▶ CONTINUE</button>
        </div>
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene, camera, renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020005);
        scene.fog = new THREE.FogExp2(0x020005, 0.035);
        
        // Camera: positioned to see notebook and monster on left
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.2, 1.6, 3.5);
        camera.lookAt(0, 0.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // CSS2DRenderer for floating text
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- lighting ---
        // ambient
        const ambient = new THREE.AmbientLight(0x221111);
        scene.add(ambient);
        // main directional light (spooky)
        const mainLight = new THREE.DirectionalLight(0xffaa77, 1.2);
        mainLight.position.set(2, 3, 1.5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        // back red fill
        const backLight = new THREE.PointLight(0x550000, 0.6);
        backLight.position.set(-1, 1.2, -2);
        scene.add(backLight);
        // flickering candle (point light)
        const flickerLight = new THREE.PointLight(0xaa5533, 0.8, 6);
        flickerLight.position.set(0.5, 0.8, 1.2);
        scene.add(flickerLight);
        
        // ground plane with cobblestone-like texture
        const canvasTex = document.createElement('canvas');
        canvasTex.width = 512;
        canvasTex.height = 512;
        const ctxTex = canvasTex.getContext('2d');
        ctxTex.fillStyle = '#2a2418';
        ctxTex.fillRect(0, 0, 512, 512);
        ctxTex.strokeStyle = '#4a3a28';
        for(let i=0;i<400;i++) {
            ctxTex.beginPath();
            ctxTex.arc(Math.random()*512, Math.random()*512, Math.random()*3+1, 0, Math.PI*2);
            ctxTex.fillStyle = `#3a2c1c`;
            ctxTex.fill();
        }
        const groundTexture = new THREE.CanvasTexture(canvasTex);
        groundTexture.wrapS = THREE.RepeatWrapping;
        groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(8, 8);
        
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.8, metalness: 0.1 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // creepy walls (back and sides)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1210, roughness: 0.9 });
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(10, 3, 0.3), wallMat);
        backWall.position.set(0, 1.2, -3.2);
        backWall.receiveShadow = true;
        scene.add(backWall);
        
        // left wall hint (monster side)
        const leftPillar = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x2f1e1a, roughness: 0.5 }));
        leftPillar.position.set(-2.8, 0.2, -1.2);
        leftPillar.castShadow = true;
        scene.add(leftPillar);
        
        // --- NOTEBOOK (3D with texture) ---
        const notebookGroup = new THREE.Group();
        // cover
        const coverMat = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.3, emissive: 0x1a0a00 });
        const cover = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.7), coverMat);
        cover.position.y = 0;
        cover.castShadow = true;
        notebookGroup.add(cover);
        // pages texture
        const pageCanvas = document.createElement('canvas');
        pageCanvas.width = 512;
        pageCanvas.height = 512;
        const pageCtx = pageCanvas.getContext('2d');
        pageCtx.fillStyle = '#f9efcf';
        pageCtx.fillRect(0, 0, 512, 512);
        pageCtx.fillStyle = '#7a5a3a';
        pageCtx.font = 'bold 28px "Courier New"';
        pageCtx.fillText("DEATH", 200, 260);
        pageCtx.fillStyle = '#3d2a1a';
        for(let i=0;i<40;i++) pageCtx.fillRect(50+Math.random()*400, 300+Math.random()*180, 3, Math.random()*12);
        const pageTexture = new THREE.CanvasTexture(pageCanvas);
        const pages = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.08, 0.65), new THREE.MeshStandardMaterial({ map: pageTexture, color: 0xefdba1 }));
        pages.position.y = 0.08;
        pages.castShadow = true;
        notebookGroup.add(pages);
        // glowing rune on cover
        const runeMat = new THREE.MeshStandardMaterial({ color: 0xaa2222, emissive: 0x441111 });
        const rune = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), runeMat);
        rune.position.set(0.3, 0.06, 0.25);
        notebookGroup.add(rune);
        
        notebookGroup.position.set(0.4, -0.2, 0.8);
        notebookGroup.rotation.y = -0.3;
        notebookGroup.castShadow = true;
        scene.add(notebookGroup);
        
        // floating particles around notebook
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 180;
        const particlePositions = new Float32Array(particleCount * 3);
        for(let i=0;i<particleCount;i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 2.5;
            particlePositions[i*3+1] = Math.random() * 1.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 2;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xff5533, size: 0.02, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeo, particleMat);
        particles.position.set(0.4, 0.1, 0.9);
        scene.add(particles);
        
        // --- MONSTER (textured, animated, on left side) ---
        const monsterGroup = new THREE.Group();
        // body
        const bodyTexCanvas = document.createElement('canvas');
        bodyTexCanvas.width = 512;
        bodyTexCanvas.height = 512;
        const bodyCtx = bodyTexCanvas.getContext('2d');
        bodyCtx.fillStyle = '#3a1a1a';
        bodyCtx.fillRect(0, 0, 512, 512);
        bodyCtx.fillStyle = '#6a2a2a';
        for(let i=0;i<300;i++) bodyCtx.fillRect(Math.random()*512, Math.random()*512, 4, 4);
        bodyCtx.fillStyle = '#aa4444';
        bodyCtx.beginPath();
        bodyCtx.arc(256, 256, 70, 0, Math.PI*2);
        bodyCtx.fill();
        const bodyTexture = new THREE.CanvasTexture(bodyTexCanvas);
        const bodyMat = new THREE.MeshStandardMaterial({ map: bodyTexture, roughness: 0.7, emissive: 0x2a0a0a });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 1.1, 12), bodyMat);
        body.castShadow = true;
        body.position.y = 0.4;
        monsterGroup.add(body);
        
        // head with multiple eyes texture
        const headTexCanvas = document.createElement('canvas');
        headTexCanvas.width = 512;
        headTexCanvas.height = 512;
        const headCtx = headTexCanvas.getContext('2d');
        headCtx.fillStyle = '#2f1111';
        headCtx.fillRect(0, 0, 512, 512);
        headCtx.fillStyle = '#ffaa66';
        headCtx.font = 'bold 60px monospace';
        headCtx.fillText("⚠", 220, 280);
        headCtx.fillStyle = '#ff0000';
        for(let i=0;i<5;i++) headCtx.fillRect(180+i*40, 320, 20, 30);
        const headTexture = new THREE.CanvasTexture(headTexCanvas);
        const headMat = new THREE.MeshStandardMaterial({ map: headTexture, emissive: 0x330000 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.55, 24, 24), headMat);
        head.position.y = 0.98;
        head.castShadow = true;
        monsterGroup.add(head);
        
        // horns
        const hornMat = new THREE.MeshStandardMaterial({ color: 0x442222 });
        const hornL = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.55, 6), hornMat);
        hornL.position.set(-0.4, 1.25, 0.2);
        hornL.castShadow = true;
        const hornR = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.55, 6), hornMat);
        hornR.position.set(0.4, 1.25, 0.2);
        hornR.castShadow = true;
        monsterGroup.add(hornL);
        monsterGroup.add(hornR);
        
        // claw arms
        const armMat = new THREE.MeshStandardMaterial({ color: 0x5a2a2a });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 0.8, 6), armMat);
        leftArm.position.set(-0.75, 0.7, 0);
        leftArm.castShadow = true;
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 0.8, 6), armMat);
        rightArm.position.set(0.75, 0.7, 0);
        rightArm.castShadow = true;
        monsterGroup.add(leftArm);
        monsterGroup.add(rightArm);
        
        monsterGroup.position.set(-2.1, -0.2, 0.2);
        monsterGroup.rotation.y = 0.35;
        scene.add(monsterGroup);
        
        // Idle animation variables
        let time = 0;
        let monsterPulse = 0;
        
        // death particle system
        let deathParticles = null;
        function createDeathBurst(pos) {
            if(deathParticles) scene.remove(deathParticles);
            const particleCountBurst = 200;
            const burstGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCountBurst * 3);
            for(let i=0;i<particleCountBurst;i++) {
                positions[i*3] = (Math.random() - 0.5) * 1.2;
                positions[i*3+1] = Math.random() * 1.2;
                positions[i*3+2] = (Math.random() - 0.5) * 1.2;
            }
            burstGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const burstMat = new THREE.PointsMaterial({ color: 0xff3300, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
            deathParticles = new THREE.Points(burstGeo, burstMat);
            deathParticles.position.copy(pos);
            scene.add(deathParticles);
            setTimeout(() => { if(deathParticles) scene.remove(deathParticles); deathParticles=null; }, 800);
        }
        
        // --- Game state ---
        let killCount = 0;
        const MAX_KILLS = 3;
        let victims = [];
        let gameActive = false;
        let processing = false;
        let currentSpeech = null;
        
        // UI elements
        const victimListUI = document.getElementById('victim-list');
        const killCountSpan = document.getElementById('killCount');
        const nameInput = document.getElementById('nameInput');
        const writeBtn = document.getElementById('writeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const monsterWhisperDiv = document.getElementById('monsterWhisper');
        const cutsceneOverlay = document.getElementById('cutsceneOverlay');
        const cutsceneMsgDiv = document.getElementById('cutsceneMsg');
        const closeCutsceneBtn = document.getElementById('closeCutscene');
        
        function updateUI() {
            victimListUI.innerHTML = victims.length === 0 ? '<li>— no names yet —</li>' : victims.map(v => `<li>🕯️ ${v} (perished)</li>`).join('');
            killCountSpan.innerText = `${killCount}/${MAX_KILLS}`;
            if(killCount >= MAX_KILLS) killCountSpan.style.animation = "pulse 0.8s infinite";
            else killCountSpan.style.animation = "none";
        }
        
        function speakScary(text, onEnd) {
            if(!window.speechSynthesis) { if(onEnd) onEnd(); return; }
            if(currentSpeech) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.7;
            utterance.pitch = 0.4;
            utterance.volume = 0.9;
            utterance.onend = () => { currentSpeech = null; if(onEnd) onEnd(); };
            utterance.onerror = () => { currentSpeech = null; if(onEnd) onEnd(); };
            currentSpeech = utterance;
            window.speechSynthesis.speak(utterance);
        }
        
        function showCutscene(titleMsg, mainMsg, voiceMsg, callback) {
            if(processing) return;
            processing = true;
            cutsceneMsgDiv.innerHTML = `<span style="color:#ff9999;">${mainMsg}</span>`;
            cutsceneOverlay.style.visibility = "visible";
            cutsceneOverlay.style.opacity = "1";
            speakScary(voiceMsg || mainMsg, () => {});
            const closeHandler = () => {
                cutsceneOverlay.style.visibility = "hidden";
                cutsceneOverlay.style.opacity = "0";
                closeCutsceneBtn.removeEventListener('click', closeHandler);
                processing = false;
                if(callback) callback();
            };
            closeCutsceneBtn.addEventListener('click', closeHandler, { once: true });
        }
        
        function monsterReaction() {
            monsterPulse = 1.2;
            monsterWhisperDiv.innerHTML = "👹 \"Death feeds the pages...\" 👹";
            setTimeout(() => { if(killCount<MAX_KILLS) monsterWhisperDiv.innerHTML = "✍️ Write another name... ✍️"; }, 1800);
            // scale bump
            monsterGroup.children.forEach(c => { if(c.material) c.material.emissiveIntensity = 0.6; });
            setTimeout(() => { monsterGroup.children.forEach(c => { if(c.material) c.material.emissiveIntensity = 0; }); }, 400);
        }
        
        function killPerson(name) {
            if(!gameActive) { showCutscene("LOCKED", "The notebook hasn't awakened. Restart chapter.", "The curse sleeps...", ()=>{}); return false; }
            if(killCount >= MAX_KILLS) { showCutscene("CHAPTER END", "Three souls already claimed. Press Restart to relive the nightmare.", "No more blood this chapter.", ()=>{}); return false; }
            if(processing) { monsterWhisperDiv.innerHTML = "⏳ The ritual is speaking..."; return false; }
            let cleanName = name.trim().substring(0, 18);
            if(cleanName === "") { monsterWhisperDiv.innerHTML = "❌ The monster demands a true name!"; return false; }
            if(victims.includes(cleanName)) { showCutscene("ECHO OF DEATH", `"${cleanName}" already perishes... their soul is bound.`, `That name is already dead.`, ()=>{}); return false; }
            
            // add victim
            victims.push(cleanName);
            killCount++;
            updateUI();
            monsterReaction();
            
            const deathScenes = [
                `${cleanName} gasps as shadows tear the flesh. A final scream.`,
                `The notebook glows. ${cleanName} crumbles into dust, bones crack.`,
                `A claw emerges from the left, dragging ${cleanName} into the abyss.`,
                `${cleanName} writes their own fate. Heart stops. Eyes go dark.`
            ];
            const deathMsg = deathScenes[Math.floor(Math.random() * deathScenes.length)];
            const voiceLine = `${cleanName}... dead. ${deathMsg.replace(cleanName, "the victim")}`;
            
            // particle burst at notebook
            createDeathBurst(notebookGroup.position.clone().add(new THREE.Vector3(0,0.2,0)));
            
            showCutscene("⚰️ DEATH NOTE ⚰️", `✞ ${cleanName} ✞\n${deathMsg}`, voiceLine, () => {
                if(killCount >= MAX_KILLS) {
                    endChapter();
                } else {
                    nameInput.value = "";
                    nameInput.focus();
                }
            });
            return true;
        }
        
        function endChapter() {
            gameActive = false;
            writeBtn.disabled = true;
            nameInput.disabled = true;
            const finalMsg = "The monster on your left grins, revealing rows of teeth. 'Three names. The pact is sealed. Chapter One ends... but you belong to the notebook now.' A cold wind extinguishes the lights... TO BE CONTINUED.";
            showCutscene("📖 CHAPTER I ENDING 📖", finalMsg, "Three souls... the pact is sealed. Your nightmare begins.", () => {
                monsterWhisperDiv.innerHTML = "🌀 CHAPTER I FINISHED. RESTART TO RELIVE THE HORROR 🌀";
                processing = false;
            });
        }
        
        function startIntro() {
            gameActive = false;
            writeBtn.disabled = true;
            nameInput.disabled = true;
            const introText = "You find a decaying notebook under a dead oak. As you open it, a monstrous creature manifests on your LEFT. Its hollow eyes lock onto you. 'Write a name... and that person will die.' The pen quivers in your hand. The curse awakens.";
            showCutscene("📓 THE DISCOVERY", introText, "Write a name... feed the pages...", () => {
                gameActive = true;
                writeBtn.disabled = false;
                nameInput.disabled = false;
                nameInput.focus();
                monsterWhisperDiv.innerHTML = "👹 'I am always at your left... Write a name...' 👹";
                processing = false;
            });
        }
        
        function resetGame() {
            if(currentSpeech) window.speechSynthesis.cancel();
            if(cutsceneOverlay.style.visibility === "visible") {
                cutsceneOverlay.style.visibility = "hidden";
                cutsceneOverlay.style.opacity = "0";
            }
            processing = false;
            gameActive = false;
            killCount = 0;
            victims = [];
            updateUI();
            nameInput.value = "";
            writeBtn.disabled = true;
            nameInput.disabled = true;
            monsterWhisperDiv.innerHTML = "⬛ The shadow stirs... restarting nightmare... ⬛";
            startIntro();
        }
        
        writeBtn.addEventListener('click', () => {
            if(gameActive && killCount < MAX_KILLS && !processing) {
                killPerson(nameInput.value);
            } else if(killCount >= MAX_KILLS) {
                showCutscene("END", "Chapter 1 is over. Press restart.", "The chapter is done.", ()=>{});
            }
        });
        nameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') writeBtn.click(); });
        restartBtn.addEventListener('click', () => { resetGame(); });
        
        // animate monster idle, flicker light, particles
        function animateScene() {
            requestAnimationFrame(animateScene);
            time += 0.016;
            
            // monster idle: slight bobbing and arm sway
            if(monsterGroup) {
                const bobY = Math.sin(time * 1.8) * 0.012;
                monsterGroup.position.y = -0.2 + bobY;
                // arms swing
                const leftArmObj = monsterGroup.children.find(c => c.position.x === -0.75);
                const rightArmObj = monsterGroup.children.find(c => c.position.x === 0.75);
                if(leftArmObj) leftArmObj.rotation.z = Math.sin(time * 2.2) * 0.25;
                if(rightArmObj) rightArmObj.rotation.z = -Math.sin(time * 2.2) * 0.2;
                // head slight tilt
                head.rotation.z = Math.sin(time * 1.2) * 0.05;
                // pulse effect after kill
                if(monsterPulse > 0) {
                    const scaleVal = 1 + monsterPulse * 0.08;
                    monsterGroup.scale.set(scaleVal, scaleVal, scaleVal);
                    monsterPulse -= 0.03;
                } else {
                    monsterGroup.scale.set(1,1,1);
                }
            }
            
            // notebook floating
            notebookGroup.position.y = -0.2 + Math.sin(time * 1.5) * 0.01;
            notebookGroup.rotation.z = Math.sin(time * 0.9) * 0.02;
            // particles rotation
            particles.rotation.y += 0.01;
            
            // flickering light
            const intensity = 0.6 + Math.random() * 0.3;
            flickerLight.intensity = intensity;
            
            // camera slight drift for eeriness
            camera.position.x += (2.2 - camera.position.x) * 0.03;
            camera.lookAt(0, 0.5, 0);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animateScene();
        resetGame(); // start game with intro
        
        // small dynamic CSS2D label for monster name
        const monsterLabelDiv = document.createElement('div');
        monsterLabelDiv.textContent = '👁️ THE STALKER 👁️';
        monsterLabelDiv.style.color = '#ff8888';
        monsterLabelDiv.style.fontSize = '14px';
        monsterLabelDiv.style.fontWeight = 'bold';
        monsterLabelDiv.style.textShadow = '0 0 5px red';
        const labelObj = new CSS2DObject(monsterLabelDiv);
        labelObj.position.set(-2.1, 1.2, 0.3);
        scene.add(labelObj);
        
        // add floor mist particles
        const mistGeo = new THREE.BufferGeometry();
        const mistCount = 400;
        const mistPos = [];
        for(let i=0;i<mistCount;i++) {
            mistPos.push((Math.random() - 0.5) * 12);
            mistPos.push(Math.random() * 0.3);
            mistPos.push((Math.random() - 0.5) * 8 - 1);
        }
        mistGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(mistPos), 3));
        const mistMat = new THREE.PointsMaterial({ color: 0x886666, size: 0.03, transparent: true, opacity: 0.3 });
        const mist = new THREE.Points(mistGeo, mistMat);
        scene.add(mist);
        
        // animate mist slowly
        function animateMist() {
            mist.rotation.y += 0.002;
            requestAnimationFrame(animateMist);
        }
        animateMist();
        
        // adjust initial window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
